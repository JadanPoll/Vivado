<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroLabs: Universal FPGA Web Pipeline</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #121212; color: #e0e0e0; margin: 2rem; max-width: 1200px; }
        h2 { margin-bottom: 5px; color: #4af626; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { font-size: 0.9rem; color: #888; margin-bottom: 20px; }
        
        /* Modular Panels */
        .panel { background: #1e2030; border: 1px solid #2a3050; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .panel h3 { margin-top: 0; color: #9cdcfe; font-size: 1.1rem; border-bottom: 1px solid #2a3050; padding-bottom: 8px; }
        
        /* Input Forms */
        .form-group { margin-bottom: 12px; display: flex; align-items: center; }
        .form-group label { width: 140px; font-size: 0.9rem; color: #b0b8c8; font-weight: bold; }
        .form-group input { flex: 1; padding: 8px; background: #0d0f1a; border: 1px solid #333; color: #fff; border-radius: 4px; font-family: monospace; font-size: 0.9rem; }
        .form-group input:focus { outline: none; border-color: #007acc; }
        .hint { font-size: 0.75rem; color: #666; margin-left: 140px; margin-top: 4px; display: block; }
        
        /* Buttons */
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        button { background: #007acc; color: white; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: background 0.2s; font-size: 1rem; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #005f9e; }
        button.green { background: #2e7d32; }
        button.green:hover:not(:disabled) { background: #388e3c; }
        
        /* Telemetry Log */
        #log { background: #0d0f1a; padding: 15px; height: 350px; overflow-y: auto; font-family: monospace; font-size: 13px; color: #4af626; border: 1px solid #2a3050; border-radius: 6px; white-space: pre-wrap; line-height: 1.4; }
        .error { color: #f97171; font-weight: bold; }
        .warn { color: #ffd43b; }
    </style>
    <script src="ftdi-jtag.js"></script>
</head>
<body>

    <h2>⚡ ZeroLabs Pipeline</h2>
    <div class="subtitle">Agnostic P&R, Bitstream Generation, and Hardware Flasher</div>
    
    <div class="panel">
        <h3>Workspace Configuration</h3>
        
        <div class="form-group">
            <label for="cfg-base">Project Base URL</label>
            <input type="text" id="cfg-base" value="https://cdn.jsdelivr.net/gh/JadanPoll/Vivado@main/PRODUCTION_GRADE" placeholder="e.g. ./ or https://github.com/user/repo/tree/main/folder">
        </div>
        <span class="hint">Paste a local path, raw CDN link, or standard GitHub URL (auto-converts).</span>
        
        <div style="display: flex; gap: 20px; margin-top: 15px;">
            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                <label style="width: auto; margin-right: 10px;" for="cfg-json">Synthesis JSON</label>
                <input type="text" id="cfg-json" value="serv.json" placeholder="design.json">
            </div>
            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                <label style="width: auto; margin-right: 10px;" for="cfg-xdc">Constraints XDC</label>
                <input type="text" id="cfg-xdc" value="serv.xdc" placeholder="pins.xdc">
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-pnr">⚙️ Run P&R Engine</button>
        <button id="btn-flash" class="green" disabled>⚡ Flash FPGA</button>
    </div>
    
    <pre id="log">System Ready. Point to your files and initialize the engine.\n</pre>

    <script type="module">
        import brotliPromise from 'https://cdn.jsdelivr.net/npm/brotli-dec-wasm@2.3.2/index.js';

        // ==========================================
        // UI HELPERS & LOGGING
        // ==========================================
        const logEl = document.getElementById('log');
        function log(msg, cls = '') {
            if (cls === 'error') console.error(msg);
            else console.log(msg);

            const span = document.createElement('span');
            span.textContent = msg + '\n';
            if (cls) span.className = cls;
            logEl.appendChild(span);
            logEl.scrollTop = logEl.scrollHeight;
        }

        // Auto-convert standard GitHub URLs to jsDelivr raw URLs
        document.getElementById('cfg-base').addEventListener('blur', (e) => {
            let url = e.target.value.trim();
            const ghMatch = url.match(/https:\/\/github\.com\/([^\/]+)\/([^\/]+)\/tree\/([^\/]+)\/(.+)/);
            if (ghMatch) {
                const [, user, repo, branch, path] = ghMatch;
                const converted = `https://cdn.jsdelivr.net/gh/${user}/${repo}@${branch}/${path}`;
                e.target.value = converted;
                log(`[UI] Auto-converted GitHub URL to raw CDN: ${converted}`, 'warn');
            }
        });

        // ==========================================
        // CORE PIPELINE STATE
        // ==========================================
        let pipelineState = { fasmStr: null, framesStr: null, bitstream: null };
        const ENGINE_ASSETS = {
            wasm: 'nextpnr-xilinx.opt.wasm',
            chipdb: 'xc7s50.bin.br',
            fasmMap: 'xc7s50_fasm_map_v2.json.br',
            yaml: 'part.yaml',
            idcode: 0x0362F093 // Spartan-7 50
        };

        // IndexedDB Caching (Unchanged, highly rigorous)
        async function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('fpga-toolchain', 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore('assets');
                req.onsuccess = e => resolve(e.target.result);
                req.onerror = e => reject(e.target.error);
            });
        }
        async function getAsset(id) {
            const db = await openDB();
            return new Promise(resolve => {
                const req = db.transaction('assets', 'readonly').objectStore('assets').get(id);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            });
        }
        async function saveAsset(id, buffer) {
            const db = await openDB();
            return new Promise(resolve => {
                const req = db.transaction('assets', 'readwrite').objectStore('assets').put(buffer, id);
                req.onsuccess = () => resolve();
            });
        }
        async function fetchAndDecompress(url, cacheKey) {
            let data = await getAsset(cacheKey);
            if (data) {
                log(`[IDB] Loaded ${cacheKey} from cache.`);
                return data instanceof ArrayBuffer ? data : data.buffer; 
            }
            log(`[NET] Fetching ${url}...`);
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${url}`);
            const compressed = new Uint8Array(await res.arrayBuffer());
            log(`[CPU] Decompressing ${cacheKey}...`);
            const brotli = await brotliPromise;
            const decompressed = brotli.decompress(compressed);
            data = new Uint8Array(decompressed).slice().buffer;
            await saveAsset(cacheKey, data);
            return data;
        }

        // ==========================================
        // EXECUTION ENGINE
        // ==========================================
        document.getElementById('btn-pnr').addEventListener('click', async () => {
            try {
                // 1. Read dynamically from the UI
                const baseUrl = document.getElementById('cfg-base').value.trim().replace(/\/$/, "");
                const jsonFile = document.getElementById('cfg-json').value.trim();
                const xdcFile = document.getElementById('cfg-xdc').value.trim();

                if (!baseUrl || !jsonFile || !xdcFile) throw new Error("Please fill out all workspace fields.");

                log(`[MAIN] Locking target: ${jsonFile} & ${xdcFile}`);
                document.getElementById('btn-pnr').disabled = true;
                
                // Assume engine assets are hosted next to index.html (or update to a fixed CDN)
                const urlChipDb = `./${ENGINE_ASSETS.chipdb}`;
                const urlWasm = `./${ENGINE_ASSETS.wasm}`;
                const urlJson = `${baseUrl}/${jsonFile}`;
                const urlXdc = `${baseUrl}/${xdcFile}`;

                const [chipdbBuffer, wasmRes, jsonRes, xdcRes] = await Promise.all([
                    fetchAndDecompress(urlChipDb, 'xc7s50-chipdb'),
                    fetch(urlWasm), fetch(urlJson), fetch(urlXdc)
                ]);

                if (!wasmRes.ok || !jsonRes.ok || !xdcRes.ok) throw new Error("Failed to fetch project files or engine assets. Check network tab.");

                const wasmBuffer = await wasmRes.arrayBuffer();
                const jsonBuffer = await jsonRes.arrayBuffer();
                const xdcString = await xdcRes.text();

                log("[MAIN] Spawning P&R Worker...");
                const worker = new Worker('pnr-worker.js');
                
                worker.onmessage = (e) => {
                    const msg = e.data;
                    if (msg.type === 'log') log(`[PNR] ${msg.text}`);
                    else if (msg.type === 'fasm_fixed') {
                        pipelineState.fasmStr = msg.data;
                        log(`[MAIN] FASM complete. Payload: ${msg.data.length} bytes.`, 'warn');
                        document.getElementById('btn-flash').disabled = false;
                        document.getElementById('btn-pnr').disabled = false;
                    } else if (msg.type === 'error') {
                        log(`[FATAL] ${msg.message}`, 'error');
                        document.getElementById('btn-pnr').disabled = false;
                    }
                    else if (msg.type === 'done') worker.terminate();
                };

                worker.postMessage({ type: 'run', wasmBuffer, chipdbBuffer, jsonBuffer, xdc: xdcString }, [wasmBuffer, chipdbBuffer, jsonBuffer]);
                
            } catch (err) { 
                log(`[MAIN Exception] ${err.message}`, 'error'); 
                document.getElementById('btn-pnr').disabled = false;
            }
        });

        document.getElementById('btn-flash').addEventListener('click', async () => {
            try {
                document.getElementById('btn-flash').disabled = true;
                
                log("[MAIN] Fetching FASM Symmetry Map...");
                const mapRaw = await fetchAndDecompress(`./${ENGINE_ASSETS.fasmMap}`, 'xc7s50-fasm-map');
                const mapData = JSON.parse(new TextDecoder().decode(mapRaw));

                log("[MAIN] Assembling Frames...");
                const fasmWorker = new Worker('fasm2frames.js');
                await new Promise((resolve, reject) => {
                    fasmWorker.onmessage = (e) => {
                        if (e.data.type === 'success') {
                            pipelineState.framesStr = e.data.frames;
                            log(`[MAIN] Frames assembled.`, 'warn');
                            log(`[MAIN] Telemetry: ${e.data.telemetry}`);
                            resolve();
                        } else if (e.data.type === 'error') reject(e.data.message);
                        fasmWorker.terminate();
                    };
                    fasmWorker.postMessage({ fasmStr: pipelineState.fasmStr, mapData });
                });

                log("[MAIN] Compiling Bitstream...");
                const partRes = await fetch(`./${ENGINE_ASSETS.yaml}`);
                if (!partRes.ok) throw new Error("Failed to fetch part.yaml");
                
                const framesWorker = new Worker('frames-worker.js');
                await new Promise((resolve, reject) => {
                    framesWorker.onmessage = (e) => {
                        if (e.data.type === 'log') log(`[FRAMES] ${e.data.text}`);
                        else if (e.data.type === 'success') {
                            pipelineState.bitstream = e.data.bitstream;
                            log(`[MAIN] Bitstream ready: ${pipelineState.bitstream.length} bytes.`, 'warn');
                            resolve();
                        } else if (e.data.type === 'error') reject(msg.message);
                    };
                    framesWorker.postMessage({ type: 'run', partYaml: await partRes.text(), framesStr: pipelineState.framesStr });
                });

                log("[USB] Seizing FTDI interface...");
                const device = await navigator.usb.requestDevice({ filters: [{vendorId: 0x0403, productId: 0x6010}] });
                const jtag = new WebUSBJtag(device);
                await jtag.init(30000000);
                
                const idcode = await jtag.readIDCODE();
                log(`[USB] Read IDCODE: 0x${idcode.toString(16).padStart(8, '0').toUpperCase()}`);
                
                if (idcode !== ENGINE_ASSETS.idcode) throw new Error(`Silicon Mismatch! Expected 0x${ENGINE_ASSETS.idcode.toString(16).toUpperCase()}.`);
                
                log("[USB] Checksum verified. Injecting payload...");
                await jtag.programXC7(pipelineState.bitstream);
                log("%c[USB] HARDWARE FLASH SUCCESSFUL.", 'warn');
                
                document.getElementById('btn-flash').disabled = false;
            } catch(err) { 
                log(`[FLASH FATAL] ${err}`, 'error'); 
                document.getElementById('btn-flash').disabled = false;
            }
        });
    </script>
</body>
</html>
