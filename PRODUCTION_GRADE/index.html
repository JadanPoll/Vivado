<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Browser FPGA Pipeline (XC7S50)</title>

    <style>

        body { font-family: system-ui, sans-serif; background: #121212; color: #e0e0e0; margin: 2rem; }

        button { background: #007acc; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-right: 10px; font-weight: bold; border-radius: 4px; }

        button:disabled { background: #333; cursor: not-allowed; }

        #log { background: #1e1e1e; padding: 15px; height: 400px; overflow-y: auto; font-family: monospace; font-size: 13px; color: #4af626; border: 1px solid #333; margin-top: 15px; white-space: pre-wrap; }

        .error { color: #ff5555; }

    </style>

    <script src="ftdi-jtag.js"></script>

</head>

<body>



    <h2>XC7S50 Browser Pipeline</h2>

    <div>

        <button id="btn-pnr">1. Run P&R (Worker)</button>

        <button id="btn-flash" disabled>2. Flash Board (WebUSB)</button>

    </div>

    <pre id="log">System Ready. Awaiting commands...\n</pre>



    <script type="module">

        import brotliPromise from 'https://cdn.jsdelivr.net/npm/brotli-dec-wasm@2.3.2/index.js';



        const logEl = document.getElementById('log');

        function log(msg, isError = false) {

            if (isError) console.error(msg);

            else console.log(msg);



            const span = document.createElement('span');

            span.textContent = msg + '\n';

            if (isError) span.className = 'error';

            logEl.appendChild(span);

            logEl.scrollTop = logEl.scrollHeight;

        }



        let pipelineState = {

            fasmStr: null,

            framesStr: null,

            bitstream: null

        };



        async function openDB() {

            return new Promise((resolve, reject) => {

                const req = indexedDB.open('fpga-toolchain', 1);

                req.onupgradeneeded = e => e.target.result.createObjectStore('assets');

                req.onsuccess = e => resolve(e.target.result);

                req.onerror = e => reject(e.target.error);

            });

        }



        async function getAsset(id) {

            const db = await openDB();

            return new Promise(resolve => {

                const req = db.transaction('assets', 'readonly').objectStore('assets').get(id);

                req.onsuccess = () => resolve(req.result);

                req.onerror = () => resolve(null);

            });

        }



        async function saveAsset(id, buffer) {

            const db = await openDB();

            return new Promise(resolve => {

                const req = db.transaction('assets', 'readwrite').objectStore('assets').put(buffer, id);

                req.onsuccess = () => resolve();

            });

        }



        async function fetchAndDecompress(url, cacheKey) {

            let data = await getAsset(cacheKey);

            if (data) {

                log(`[IDB] Loaded ${cacheKey} from cache.`);

                return data instanceof ArrayBuffer ? data : data.buffer; 

            }

            log(`[NET] Fetching ${url}...`);

            const res = await fetch(url);

            const compressed = new Uint8Array(await res.arrayBuffer());

            

            log(`[CPU] Decompressing ${url}...`);

            const brotli = await brotliPromise;

            const decompressed = brotli.decompress(compressed);

            

            data = new Uint8Array(decompressed).slice().buffer;

            

            await saveAsset(cacheKey, data);

            return data;

        }



        document.getElementById('btn-pnr').addEventListener('click', async () => {

            try {

                log("[MAIN] Loading P&R inputs...");

                

                const [chipdbBuffer, wasmRes, jsonRes, xdcRes] = await Promise.all([

                    fetchAndDecompress('xc7s50.bin.br', 'xc7s50-chipdb'),

                    fetch('nextpnr-xilinx.opt.wasm'),

                    fetch('serv.json'),

                    fetch('serv.xdc')

                ]);



                const wasmBuffer = await wasmRes.arrayBuffer();

                const jsonBuffer = await jsonRes.arrayBuffer();

                const xdcString = await xdcRes.text();



                log("[MAIN] Spawning P&R Worker...");

                const worker = new Worker('pnr-worker.js');

                

                worker.onmessage = (e) => {

                    const msg = e.data;

                    if (msg.type === 'log') log(`[PNR] ${msg.text}`);

                    else if (msg.type === 'fasm_fixed') {

                        pipelineState.fasmStr = msg.data;

                        log(`[MAIN] FASM complete. Size: ${msg.data.length} bytes.`);

                        document.getElementById('btn-flash').disabled = false;

                    } else if (msg.type === 'error') log(`[FATAL] ${msg.message}`, true);

                    else if (msg.type === 'done') worker.terminate();

                };



                worker.postMessage({

                    type: 'run',

                    wasmBuffer, chipdbBuffer, jsonBuffer, xdc: xdcString

                }, [wasmBuffer, chipdbBuffer, jsonBuffer]);

                

            } catch (err) { log(`[MAIN] Exception: ${err.message}`, true); }

        });



        document.getElementById('btn-flash').addEventListener('click', async () => {

            try {

                log("[MAIN] Fetching FASM Symmetry Map...");

                const mapRaw = await fetchAndDecompress('xc7s50_fasm_map_v2.json.br', 'fasm-map');

                const mapStr = new TextDecoder().decode(mapRaw);

                const mapData = JSON.parse(mapStr);



                log("[MAIN] Assembling Frames (fasm2frames Worker)...");

                const fasmWorker = new Worker('fasm2frames.js');

                

                await new Promise((resolve, reject) => {

                    fasmWorker.onmessage = (e) => {

                        if (e.data.type === 'success') {

                            pipelineState.framesStr = e.data.frames;

                            log(`[MAIN] Frames assembled. Size: ${e.data.frames.length} bytes.`);

                            log(`[MAIN] Telemetry: ${e.data.telemetry}`);

                            resolve();

                        } else if (e.data.type === 'error') {

                            reject(e.data.message);

                        }

                        fasmWorker.terminate();

                    };

                    fasmWorker.postMessage({ fasmStr: pipelineState.fasmStr, mapData });

                });



                log("[MAIN] Executing xc7frames2bit in Worker...");

                const partRes = await fetch('part.yaml');

                const partYaml = await partRes.text();



                const framesWorker = new Worker('frames-worker.js');

                

                await new Promise((resolve, reject) => {

                    framesWorker.onmessage = (e) => {

                        const msg = e.data;

                        if (msg.type === 'log') log(`[FRAMES] ${msg.text}`);

                        else if (msg.type === 'success') {

                            pipelineState.bitstream = msg.bitstream;

                            log(`[MAIN] Bitstream generated: ${pipelineState.bitstream.length} bytes.`);

                            resolve();

                        } else if (msg.type === 'error') {

                            reject(msg.message);

                        }

                    };

                    

                    framesWorker.postMessage({

                        type: 'run',

                        partYaml: partYaml,

                        framesStr: pipelineState.framesStr

                    });

                });



                log("[USB] Requesting FTDI device...");

                const device = await navigator.usb.requestDevice({

                    filters: [{vendorId: 0x0403, productId: 0x6010}]

                });

                const jtag = new WebUSBJtag(device);

                await jtag.init(30000000);

                

                const idcode = await jtag.readIDCODE();

                const expectedId = 0x0362F093;

                

                log(`[USB] IDCODE: 0x${idcode.toString(16).padStart(8, '0').toUpperCase()}`);

                

                // THE GATE: Hard abort on desync

                if (idcode !== expectedId) {

                    throw new Error(`IDCODE Mismatch! Expected 0x0362F093. The JTAG chain is desynchronized.`);

                }

                

                log("[USB] IDCODE verified. Flashing bitstream...");

                await jtag.programXC7(pipelineState.bitstream);

                log("[USB] Done! Check DONE LED.");

            } catch(err) { log(`[FLASH ERROR] ${err}`, true); }

        });

    </script>

</body>

</html>
